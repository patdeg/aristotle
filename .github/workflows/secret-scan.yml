name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .github/gitleaks.toml

  author-email-guard:
    name: commit author email guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject personal email addresses in git history
        shell: bash
        run: |
          set -euo pipefail

          # Any commit with a personal-looking email address is blocked.
          # Contributors should use GitHub's noreply format:
          #   NUMERIC_ID+USERNAME@users.noreply.github.com
          BAD_AUTHORS=$(git log --all --format='%ae%n%ce' | sort -u | \
            grep -iE '@(gmail|yahoo|hotmail|outlook|icloud|protonmail|me|aol|msn|live)\.(com|net)$' || true)

          if [[ -n "$BAD_AUTHORS" ]]; then
            echo "::error::Personal email address found in commit history:"
            echo "$BAD_AUTHORS"
            echo ""
            echo "Contributors: set git config user.email to GitHub's noreply format."
            echo "See CONTRIBUTING.md for how to rewrite history if you already pushed."
            exit 1
          fi

          echo "✅ No personal email addresses in commit history."

  pii-regex:
    name: PII regex guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for PII patterns
        shell: bash
        run: |
          set -euo pipefail

          # Files to scan: everything tracked by git EXCEPT the workflow itself,
          # the gitleaks config, and documentation about what we block.
          mapfile -t FILES < <(git ls-files | \
            grep -v -E '^\.github/workflows/secret-scan\.yml$' | \
            grep -v -E '^\.github/gitleaks\.toml$' | \
            grep -v -E '^README\.md$' | \
            grep -v -E '^docs/images/.*\.(png|jpg|jpeg|gif|webp)$' )

          FAIL=0

          # Uses grep -P (PCRE) for lookaheads. ubuntu-latest ships GNU grep with -P.
          check() {
            local label="$1" pattern="$2"
            local hits
            hits=$(grep -HnP "$pattern" "${FILES[@]}" 2>/dev/null || true)
            if [[ -n "$hits" ]]; then
              echo "::error::PII check failed — $label"
              echo "$hits"
              FAIL=1
            fi
          }

          check "real email address" \
            '\b[A-Za-z0-9._%+-]+@(?!example\.)(?!your[a-z]*\.)(?!yourdomain\b)(?!placeholder\b)[A-Za-z0-9.-]+\.(?!example\b)[A-Za-z]{2,}\b'

          check "US phone number" \
            '\b(?:\+?1[-. ]?)?\(?[2-9][0-9]{2}\)?[-. ]?[0-9]{3}[-. ]?[0-9]{4}\b'

          check "Canvas access token" \
            '\b[0-9]{3,6}~[A-Za-z0-9]{40,}\b'

          check "API key (sk-/pk-/dmt_/AIza)" \
            '\b(?:sk|pk|dmt|AIza)[-_][A-Za-z0-9_-]{20,}\b'

          check "AWS access key" \
            '\bAKIA[0-9A-Z]{16}\b'

          check "private key header" \
            '-----BEGIN (?:RSA |OPENSSH |EC |DSA |PGP )?PRIVATE KEY-----'

          if [[ $FAIL -ne 0 ]]; then
            echo ""
            echo "❌ Do not commit this. Move the value to .env (gitignored) or rewrite the example."
            exit 1
          fi

          echo "✅ No PII patterns detected."
